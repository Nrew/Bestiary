<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestiary Compendium</title>
    <!-- Preload critical fonts to reduce LCP -->
    <link rel="preload" href="/src/assets/fonts/EBGaramond-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/src/assets/fonts/Cinzel-Medium.woff2" as="font" type="font/woff2" crossorigin>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: oklch(94% 0.02 75);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- This is the pre-React loading spinner -->
      <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <div style="width: 40px; height: 40px; border: 4px solid hsl(30 15% 20%); border-top-color: hsl(45 93% 47%); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="position: absolute; top: 120%; left: 50%; transform: translateX(-50%); font-size: 14px; color: hsl(30 5% 35%); white-space: nowrap;">Loading Compendium...</p>
      </div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

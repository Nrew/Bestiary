name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend (typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Rust (required for ts-rs bindings)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Tauri 2 system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm run audit:npm

      - name: Generate TypeScript bindings
        run: npm run types:generate

      - name: Verify generated bindings are committed
        shell: bash
        run: |
          git add src/types/generated.ts
          if ! git diff --cached --quiet src/types/generated.ts; then
            echo "::error::src/types/generated.ts is out of date. Run 'npm run types:generate' and commit the result."
            git --no-pager diff --cached src/types/generated.ts
            exit 1
          fi
          git restore --staged src/types/generated.ts

      - name: TypeScript check
        run: npm run types:check

      - name: Lint (ESLint + tsc)
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test -- --run

      - name: Build frontend
        run: npm run build

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Tauri 2 system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --locked

  audit:
    name: cargo audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit || true

      - name: Run cargo audit
        working-directory: src-tauri
        # RUSTSEC-2023-0071: RSA key extraction via Marvin attack in the `rsa` crate.
        # This app never performs RSA operations or accepts untrusted TLS input — it is
        # a fully offline desktop app with no network-facing parsing. Safe to suppress.
        run: cargo audit --ignore RUSTSEC-2023-0071

